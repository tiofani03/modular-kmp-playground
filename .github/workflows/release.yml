name: Release

# Trigger on version tags (e.g. v1.2.0)
on:
  push:
    tags:
      - "v*"

# Allow the workflow to write back to the repository (for updating Package.swift)
# and to create/upload releases.
permissions:
  contents: write
  packages: write

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build Android artifacts and publish to GitHub Packages (Maven)
  # ---------------------------------------------------------------------------
  publish-android:
    name: Publish Android artifacts to Maven
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish :shared to GitHub Packages
        run: ./gradlew :shared:publishAllPublicationsToGitHubPackagesRepository -PVERSION_NAME=${{ steps.version.outputs.VERSION }}
        env:
          ACTOR: ${{ github.actor }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}

      - name: Publish :shared-ui-android to GitHub Packages
        run: ./gradlew :shared-ui-android:publishReleasePublicationToGitHubPackagesRepository -PVERSION_NAME=${{ steps.version.outputs.VERSION }}
        env:
          ACTOR: ${{ github.actor }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}

  # ---------------------------------------------------------------------------
  # 2. Build XCFramework, zip it, compute SPM checksum, update Package.swift,
  #    and create a GitHub Release with the zip as an asset.
  # ---------------------------------------------------------------------------
  release-ios:
    name: Build XCFramework and create GitHub Release
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use a PAT (or the default GITHUB_TOKEN) so the push-back step works
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and zip XCFramework
        run: ./gradlew :shared:zipXCFramework -PVERSION_NAME=${{ steps.version.outputs.VERSION }}

      - name: Compute SPM checksum
        id: checksum
        run: |
          ZIP=shared/build/distributions/shared.xcframework.zip
          CHECKSUM=$(swift package compute-checksum "$ZIP")
          echo "CHECKSUM=$CHECKSUM" >> "$GITHUB_OUTPUT"

      - name: Update Package.swift with release URL and checksum
        run: |
          TAG="${GITHUB_REF_NAME}"
          REPO="${{ github.repository }}"
          RELEASE_URL="https://github.com/${REPO}/releases/download/${TAG}/shared.xcframework.zip"
          CHECKSUM="${{ steps.checksum.outputs.CHECKSUM }}"
          sed -i '' \
            -e "s|let xcframeworkURL = \".*\"|let xcframeworkURL = \"${RELEASE_URL}\"|" \
            -e "s|let xcframeworkChecksum = \".*\"|let xcframeworkChecksum = \"${CHECKSUM}\"|" \
            Package.swift

      - name: Commit updated Package.swift
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift
          git commit -m "chore(release): update Package.swift for ${{ github.ref_name }}" || true

      - name: Push Package.swift update
        run: |
          # Determine the default branch (main or master) from the remote HEAD ref.
          DEFAULT_BRANCH=$(git symbolic-ref refs/remotes/origin/HEAD 2>/dev/null | sed 's|refs/remotes/origin/||')
          if [ -z "$DEFAULT_BRANCH" ]; then
            # Fallback: try main, then master
            git push origin HEAD:main 2>/dev/null || git push origin HEAD:master
          else
            git push origin "HEAD:${DEFAULT_BRANCH}"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          generate_release_notes: true
          files: shared/build/distributions/shared.xcframework.zip
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
